function GetFilesByKeyID()
{

    const url = `${BASE_URL}/AE/GetFilesByKeyID`;
    $.ajax({

         },

   });
}

}




 function GetFileBySeq(Index) {
    var KeyID = $("#hidCknum").val();
    const Type = "Upload";
    const url = `${BASE_URL}/AE/GetFileBySeq`;

    // 顯示遮罩
    $("#loading-mask").show();

    $.ajax({
        url: url + '?KeyID=' + KeyID + '&Type=' + Type + '&Index=' + Index,
        type: 'POST',
        data: {},
        contentType: 'application/json; charset=utf-8',
        success: function(result) {
            if (result.resultCode == "000") {
                var item = result.objResult;
                
                // 使用 setTimeout 確保「顯示遮罩」的動作先被瀏覽器渲染
                setTimeout(function() {
                    processFileStream(item.file_body_encode, item.file_name, item.content_type,KeyID);
                    
                    // 轉檔完成後關閉遮罩
                    $("#loading-mask").hide();
                }, 100);
            } else {
                $("#loading-mask").hide();
                alert(result.resultMsg);
                $("#txtError").val(result.resultMsg);
            }
        },
        error: function(xhr, status, error) {
            $("#loading-mask").hide();
            console.log(error);
        }
    });
}

function processFileStream(base64, fileName, contentType,KeyID) {
    const ext = fileName.split('.').pop().toLowerCase();
    
    // Base64 解碼 (這部分最吃效能)
    const byteCharacters = atob(base64);
    const byteNumbers = new Array(byteCharacters.length);
    for (let i = 0; i < byteCharacters.length; i++) {
        byteNumbers[i] = byteCharacters.charCodeAt(i);
    }
    const byteArray = new Uint8Array(byteNumbers);

    const mimeMap = {
        'pdf': 'application/pdf',
        'jpg': 'image/jpeg', 'jpeg': 'image/jpeg', 'png': 'image/png',
        'txt': 'text/plain',
        'mp4': 'video/mp4', 'mov': 'video/quicktime'
    };

    const targetMime = mimeMap[ext] || contentType;
    const blob = new Blob([byteArray], { type: targetMime });
    const fileURL = window.URL.createObjectURL(blob);

    const previewExtensions = ['pdf', 'jpg', 'jpeg', 'png', 'txt', 'mp4', 'mov'];

    if (previewExtensions.includes(ext)) {
       // window.open(fileURL, '_blank');
		window.open(fileURL,'_UpLoad_'+ KeyID,'scrollbars=yes,resizable=no,width=725,height=480,top=300,left=150');

    } else {
        const link = document.createElement('a');
        link.href = fileURL;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    setTimeout(() => window.URL.revokeObjectURL(fileURL), 10000);
}
