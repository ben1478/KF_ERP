<script>

$(document).ready(function() {

	//sessionStorage.getItem("U_num");
	const Params = new URLSearchParams(window.location.search);
	const cknum = Params.get('cknum');
	$("#spCknum").html(cknum)
	$("#hidCknum").val(cknum)
	
	$('.file').bind('change', function() {
			convertFiles('.file',"attachmentFile") 
	});
	
	$('#addFile').bind('click', function() {
			InsertReceive()
	});
	
});

  

function readFile(InputID,file, index, callback) 
{
		const reader = new FileReader();
		reader.readAsDataURL(file);
		reader.onload = () => 
    {
        const fileObj = 
        {
            file_index: index.toString(),
            file_body_encode: reader.result.split(',')[1],
            file_size: file.size.toString(),
            content_type: file.name.split('.').pop(),
            file_name: file.name
        };
        const fileSizeInBytes = file.size;
        $("#lbl"+InputID).html(  Math.floor((fileSizeInBytes / 1024)).toString()+"KB");
        
        callback(fileObj);
		};
}

function convertFiles(p_Class,p_preName) 
{
    const fileInputs = [];
		$(p_Class).each(function(index, element) 
    {
        fileInputs.push(element)
		});
    const results = [];
    let m_fileIndex = 1;
    for (let i = 0; i < fileInputs.length; i++) 
		{
        if (fileInputs[i].files.length > 0)
        {
            const file = fileInputs[i].files[0];
            readFile(fileInputs[i].id,file, m_fileIndex, (fileObj) => 
            {
                results.push(fileObj);
                $("#" + p_preName).prop("textContent",JSON.stringify(results, null, 2));
            });
            m_fileIndex += 1;
        }
    }
    return false;
}


function InsertReceive()
{
	const url = `${BASE_URL}/AE/InsertFile`;
	var KeyID=$("#hidCknum").val();
	let objFiles = JSON.parse($("#attachmentFile").prop("textContent"));
	var U_num = sessionStorage.getItem("U_num");
	// 顯示遮罩
    $("#loading-mask").show();
	
	
	// 執行POST請求
	$.ajax({
		url: url+'?KeyID='+KeyID+'&Type=Upload&u_num='+U_num,
		type: 'POST',
		data: JSON.stringify(objFiles),
		contentType: 'application/json; charset=utf-8',
		success: function(result) 
		{
			if(result.resultCode=="000")
			{
				// 轉檔完成後關閉遮罩
               setTimeout(function() { $("#loading-mask").hide();
                }, 100);
				var m_form_no=result.resultMsg;
				alert("上傳成功 ");
				if (window.opener && !window.opener.closed) {
					window.opener.location.reload(); // 通知父頁面重新整理
				}
				window.close(); // 關閉當前的 B 頁面
				
			}
			else
			{
			$("#loading-mask").hide();
				alert("上傳失敗;"+result.resultMsg);
			}
		 },
		error: function(xhr, status, error) 
		{
		$("#loading-mask").hide();
		  alert("WebAPI連線錯誤!!");
		}
	});
}



</script>
