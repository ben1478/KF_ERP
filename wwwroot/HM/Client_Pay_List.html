<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>
    <script type="text/javascript" src="../tool_js/jquery.blockUI.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <link href="../_include/main.css" rel="stylesheet" type="text/css">
    <script src="../Base.js"></script>
    <script src="../_include/exceljs.min.js"></script>
    <script src="../_include/filesaver.min.js"></script>
    <title>作業平台</title>
</head>
<body>
    <div>
        <span id="showPlan">
            <label>應繳款日期區間:</label>
            <input type="text" value="" name="checkDateS" class="datepickerTW" placeholder="年 /月 /日" style="width:80px;">~
            <input type="text" value="" name="checkDateE" class="datepickerTW" placeholder="年 /月 /日" style="width:80px;">
            &nbsp;&nbsp;
            <label>客戶姓名:</label>
            <input type="text" value="" name="CS_Name" style="width:80px" />
            &nbsp;&nbsp;
            <label>客戶身分證:</label>
            <input type="text" value="" name="CS_PID" style="width:80px" />
            &nbsp;&nbsp;
        </span>
        <span id="showSelect" style="display: none;">
            <label>業務:</label>
            <input type="hidden" name="U_num" id="U_num" value="">
            <input type="text" name="U_name" id="U_name" size="10" maxlength="10" class="box" value="" readonly="">
            <input type="button" value="..." id="select_user_one">
        </span>
        &nbsp;&nbsp;
        <span id="showCase" style="display: none;">
            <select name="case_status" id="case_status" style="width:80px;">
                <option value="N" selected>待繳款</option>
                <option value="Y">已繳款</option>
            </select>
        </span>
        <input type="button" value="查詢" onclick="fetchData();" />
    </div>
    <br />
    <br />
    <table width="1250px" id="MainTableRec" border="0" cellpadding="4" cellspacing="1" bgcolor="#666666" style="display:none;">
        <thead>
            <tr align="center" bgcolor="#CCCCFF" class="TrHead">
                <td width="3%">No.</td>
                <td width="7%">客戶姓名</td>
                <td width="5%">客戶ID</td>
                <td width="6%">繳款期數</td>
                <td width="10%">應繳款日期</td>
                <td width="7%">月付金</td>
                <td width="6%">利息</td>
                <td width="7%">償還本金</td>
                <td width="4%">手續費</td>
                <td width="8%">本金餘額</td>
                <td width="7%">繳款日期</td>
                <td width="7%">帳戶後5碼</td>
                <td width="7%">已繳款金額</td>
                <td width="10%">備註</td>
                <td width="7%">上傳檔案</td>
            </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
            <tr align="center" height="15" bgcolor="#CCCCFF">
                <td class="c12-k" colspan="15">
                    <font color="#000080">
                        <label id="CountRows"></label>
                    </font>
                </td>
            </tr>
            <tr align="center" height="40" bgcolor="#EEEEFF">
                <td class="c12-k" colspan="15">
                    <input type="button" value="確認送出" onclick="SaveData();" style="padding:5px 15px;">
                </td>
            </tr>
        </tfoot>
    </table>

    <table width="1250px" id="MainTableWin" border="0" cellpadding="4" cellspacing="1" bgcolor="#666666" style="display:none;">
        <thead>
            <tr align="center" bgcolor="#CCCCFF" class="TrHead">
                <td width="3%">No.</td>
                <td width="3%"> <input type="checkbox" id="select-all"></td>
                <td width="10%">客戶姓名</td>
                <td width="5%">客戶ID</td>
                <td width="5%">繳款期數</td>
                <td width="7%">應繳款日期</td>
                <td width="7%">月付金</td>
                <td width="7%">利息</td>
                <td width="7%">償還本金</td>
                <td width="5%">手續費</td>
                <td width="9%">本金餘額</td>
                <td width="7%">帳號後5碼</td>
                <td width="7%">已繳款金額</td>
                <td width="9%">備註</td>
                <td width="9%">回傳結果</td>
            </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
            <tr align="center" height="15" bgcolor="#CCCCFF">
                <td class="c12-k" colspan="15">
                    <font color="#000080">
                        <label id="CountRows"></label>
                    </font>
                </td>
            </tr>
        </tfoot>
        <tr align="center" height="40" bgcolor="#EEEEFF">
            <td class="c12-k" colspan="15">
                <input type="button" value="上傳文中" onclick="UpdWinInv();" style="padding:5px 15px;">
            </td>
        </tr>
    </table>
</body>
</html>
<script>
    const Params = getQueryParams();
    let WebUser = Params.WebUser;
    let WebBC = Params.WebBC;

    let ChkRole;
    let data = [];
    let Rnum;

    const RoleA = ["1001", "1003", "1007", "1011"]; //全部
    const RoleB = ["1004", "1005"]; //財務端
    const RoleC = ["1008", "1009", "1010"]; //業務端

    document.addEventListener("change", function (e) {
        if (e.target.id === "select-all") {
            const isChecked = e.target.checked;
            document.querySelectorAll(".row-check").forEach(function (cb) {
                cb.checked = isChecked;
            });
        }
    });

    dateTW();
    GetUserRnum();

    $('.datepickerTW').datepickerTW({
        changeYear: true,
        changeMonth: true,
        dateFormat: 'yy-mm-dd'
    });

    function GetUserRnum() {
        const url = `${BASE_URL}/AE/GetUserRole?User=${WebUser}`;
        fetch(url, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(responseData => {
                if (responseData.resultCode === '000') {
                    Rnum = responseData.objResult;
                    if (RoleA.includes(Rnum)) {
                        document.querySelector('#showCase').style.display = "";
                        document.querySelector('#showSelect').style.display = "";
                        document.getElementById("select_user_one").addEventListener("click", function () {
                            openUserOne('appUser');
                        });
                    } else {
                        if (Rnum !== "1009") {
                            document.querySelector('#showSelect').style.display = "";
                            document.getElementById("select_user_one").addEventListener("click", function () {
                                openUserOne('appUser', '', WebBC, 'Y');
                            });
                        }
                    }

                    if (RoleB.includes(Rnum)) {
                        document.querySelector('#showPlan').style.display = "none";
                        document.querySelector('#showCase').style.display = "none";
                        document.querySelector('#showSelect').style.display = "none";
                    }
                   
                    if (!RoleA.includes(Rnum)) {
                        fetchData();
                    }
                }
            })
            .catch(error => {
                console.error('ChkUserRole Error:', error);
                alert('角色辨別失敗，請稍後再試。');
            })
    }

    function fetchData() {
        document.querySelector('#MainTableRec').style.display = "none";
        document.querySelector('#MainTableWin').style.display = "none";

        if (RoleA.includes(Rnum)) {
            if (document.querySelector('#case_status').value === 'Y') {
                CliePayLQuery();
            } else {
                RecPayLQuery(1);
            }
        }
        else if (RoleB.includes(Rnum)) {
            CliePayLQuery();
        }
        else if (RoleC.includes(Rnum)) {
            if (Rnum === '1009') {
                RecPayLQuery(3);
            } else {
                RecPayLQuery(2);
            }
        }
    }

    //1.查看全部資訊  2.查看分區資訊  3.查看單一業務資訊
    function RecPayLQuery(queryType) {
        const RecData_req = {
            tbInfo: {
                add_num: WebUser,
                edit_num: WebUser
            },
            RC_Date_S: document.querySelector('input[name="checkDateS"]').value,
            RC_Date_E: document.querySelector('input[name="checkDateE"]').value,
            queryType: queryType,
            CS_Name: document.querySelector('input[name="CS_Name"]').value,
            CS_PID: document.querySelector('input[name="CS_PID"]').value,
            plan_num: document.getElementById("U_num").value
        };

        const url = `${BASE_URL}/AE_HM/Receivable_Pay_LQuery`;

        $('body').css('cursor', 'wait');

        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            credentials: 'include',
            body: JSON.stringify(RecData_req)
        })
            .then(response => response.json())
            .then(responseData => {
                if (responseData.resultCode == "000") {
                    data = JSON.parse(responseData.objResult);
                    showRecTable();
                } else {
                    alert(responseData.resultMsg);
                }
            })
            .catch(error => {
                alert('API 請求失敗:', error);
            })
            .finally(
                $('body').css('cursor', 'default')
            );
    }

    function showRecTable() {
        document.querySelector('#MainTableRec').style.display = "table";
        document.getElementById('CountRows').innerHTML = `筆數:${data.length}`;
        const tbody = document.querySelector('#MainTableRec tbody');
        tbody.innerHTML = '';

        const columnOrder = ['CS_name','CS_PID', 'RC_count', 'roc_RC_date', 'amount_per_month', 'interest', 'Rmoney', 'HFees',
            'Ex_RemainingPrincipal', 'CP_pay_date', 'CP_account_last','CP_Pay_Amt', 'CP_bus_remark','FileCount'];
        data.forEach((item, index) => {
            const row = document.createElement('tr');
            row.setAttribute('align', 'center');
            row.className = 'c12-k';
            row.style.backgroundColor = '#FFFFFF';
            row.onmouseover = function () { this.style.background = '#FCFCC0'; };
            row.onmouseout = function () { this.style.background = '#FFFFFF'; };

            //把整筆資料存到 tr
            row.dataset.rowData = JSON.stringify(item);

            const serialCell = document.createElement('td');
            serialCell.textContent = index + 1;  // 序號
            row.appendChild(serialCell);

            columnOrder.forEach(key => {
                const cell = document.createElement('td');
                switch (key) {
                    case "amount_per_month":
                    case "interest":
                    case "Rmoney":
                    case "HFees":
                    case "Ex_RemainingPrincipal":
                        cell.textContent = Number(item[key]).toLocaleString();
                        break;
                    case "CP_pay_date":
                        cell.innerHTML = `<input type="text" name="CP_pay_date" class="datepickerTW" placeholder="年 /月 /日" style="width:80px;">`;
                        break;
                    case "CP_account_last":
                        cell.innerHTML = `<input type="text" name="CP_account_last" maxlength="6" size="6">`;
                        break;
                    case "CP_Pay_Amt":
                        cell.innerHTML = `<input type="text" name="CP_Pay_Amt" maxlength="7" size="7" value="${item[key] ?? ''}">`;
                        break;
                    case "CP_bus_remark":
                        cell.innerHTML = `<input type="text" name="CP_bus_remark" value="${item[key] ?? ''}">`;
                        break;
                    case "FileCount":
                        cell.innerHTML = `<input type="button" value="附加檔案(${Number(item[key])})" onclick="OpenUpload('P${item.RCD_id}','Upload')">`;
                        break;
                    default:
                        cell.textContent = item[key];
                        break;
                }

                row.appendChild(cell);
            });
            tbody.appendChild(row);
            dateTW();
            $('.datepickerTW').datepickerTW({
                changeYear: true,
                changeMonth: true,
                dateFormat: 'yy-mm-dd'
            });
        });
    }

    function SaveData() {
        const tbody = document.querySelector('#MainTableRec tbody');
        const rows = tbody.querySelectorAll('tr');

        const updatedData = [];

        rows.forEach(row => {
            const rowData = JSON.parse(row.dataset.rowData);

            const cpPayDate = convertTWDateToAD(row.querySelector('input[name="CP_pay_date"]').value);
            const cpAccountLast = row.querySelector('input[name="CP_account_last"]').value;
            const cpPayAmt = row.querySelector('input[name="CP_Pay_Amt"]').value;

            if (cpPayDate && cpPayAmt) {
                rowData.CP_pay_date = cpPayDate;
                rowData.CP_account_last = cpAccountLast;
                rowData.CP_Pay_Amt = cpPayAmt;
                rowData.CP_bus_remark = row.querySelector('input[name="CP_bus_remark"]').value;
                rowData.User = WebUser
                updatedData.push(rowData);
            }
        });

        if (updatedData.length === 0) {
            alert("至少要有一筆資料，再確認繳款日期跟已繳款金額是否都有輸入");
            return;
        }

        const url = `${BASE_URL}/AE_HM/Client_Pay_Ins`;

        $('body').css('cursor', 'wait');

        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(updatedData),
            success: function (resData) {
                alert(resData.resultMsg);
            },
            error: function (err) {
                alert("儲存失敗: " + err.responseText);
            },
            complete: function () {
                $('body').css('cursor', 'default');
                fetchData();
            }
        });

    }

    function CliePayLQuery() {
        const url = `${BASE_URL}/AE_HM/Client_Pay_LQuery`;

        $('body').css('cursor', 'wait');

        fetch(url, {
            method: 'GET',
            headers: {
                'Content-Type': 'application/json',
            },
            credentials: 'include'
        })
            .then(response => response.json())
            .then(responseData => {
                if (responseData.resultCode == "000") {
                    data = JSON.parse(responseData.objResult);
                    showCliePayTable();
                } else {
                    alert(responseData.resultMsg);
                }
            })
            .catch(error => {
                alert('API 請求失敗:', error);
            })
            .finally(
                $('body').css('cursor', 'default')
        );
    }

    function showCliePayTable() {
        document.querySelector('#MainTableWin').style.display = "table";
        document.getElementById('CountRows').innerHTML = `筆數:${data.length}`;
        const tbody = document.querySelector('#MainTableWin tbody');
        tbody.innerHTML = '';

        const columnOrder = ['RCD_id', 'CS_name', 'CS_PID', 'RC_count', 'roc_RC_date', 'amount_per_month', 'interest', 'Rmoney', 'HFees', 'Ex_RemainingPrincipal',
            'CP_account_last', 'CP_Pay_Amt', 'CP_bus_remark', 'Win_Msg'];
        data.forEach((item, index) => {
            const row = document.createElement('tr');
            row.setAttribute('align', 'center');
            row.className = 'c12-k';
            row.style.backgroundColor = '#FFFFFF';
            row.onmouseover = function () { this.style.background = '#FCFCC0'; };
            row.onmouseout = function () { this.style.background = '#FFFFFF'; };

            //把整筆資料存到 tr
            row.dataset.rowData = JSON.stringify(item);

            const serialCell = document.createElement('td');
            serialCell.textContent = index + 1;  // 序號
            row.appendChild(serialCell);

            columnOrder.forEach(key => {
                const cell = document.createElement('td');
                if (key === "RCD_id") {

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'row-check';
                    checkbox.value = item.RCD_id;

                    cell.appendChild(checkbox);
                    row.appendChild(cell);

                } else {

                    switch (key) {
                        case "amount_per_month":
                        case "interest":
                        case "Rmoney":
                        case "HFees":
                        case "Ex_RemainingPrincipal":
                            cell.textContent = Number(item[key]).toLocaleString();
                            break;
                        case "CP_Pay_Amt":
                            cell.textContent = Number(item[key]).toLocaleString();
                            break;
                        case "CP_bus_remark":
                            const input = document.createElement('input');
                            input.type = 'text';
                            input.name = 'CP_bus_remark';
                            input.value = item[key] ?? ''; 
                            cell.appendChild(input);
                            break;
                        default:
                            cell.textContent = item[key];
                            break;
                    }

                    row.appendChild(cell);
                }
            });
            tbody.appendChild(row);
        });
    }

    function UpdWinInv() {
        const selectedData = [];

        document.querySelectorAll('.row-check:checked').forEach(chk => {
            const row = chk.closest('tr');
            const rowData = JSON.parse(row.dataset.rowData);

            const model = {
                HS_id: Number(rowData.HS_id),
                RCD_id: Number(rowData.RCD_id),
                CS_name: rowData.CS_name,
                CS_PID: rowData.CS_PID,
                RC_count: Number(rowData.RC_count),
                roc_RC_date: rowData.roc_RC_date,
                amount_per_month: Number(rowData.amount_per_month),
                interest: Number(rowData.interest),
                Rmoney: Number(rowData.Rmoney),
                HFees: rowData.HFees ? Number(rowData.HFees) : null,
                Ex_RemainingPrincipal: Number(rowData.Ex_RemainingPrincipal),
                amount_total: Number(rowData.amount_total),
                month_total: Number(rowData.month_total),
                RecPayDate: rowData.RecPayDate,
                Win_Msg: rowData.Win_Msg,
                User: WebUser,
                CP_account_last: rowData.CP_account_last,
                CP_bus_remark: row.querySelector('input[name="CP_bus_remark"]').value,
                CP_Pay_Amt: rowData.CP_Pay_Amt
            };

            selectedData.push(model);
        });

        if (selectedData.length === 0) {
            alert("請至少勾選一筆資料");
            return;
        }

        const url = `${BASE_URL}/SendPaySelfForInv`;

        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(selectedData),
            success: function (resData) {
                if (resData.resultCode == "000") {
                    data = JSON.parse(resData.objResult);
                    showWinResTable();
                } else {
                    alert(resData.resultMsg);
                }
            },
            error: function (err) {
                alert("開立失敗: " + err.responseText);
            },
            complete: function () {
                $('body').css('cursor', 'default');
            }
        });

        console.log(selectedData);
    }

    function showWinResTable() {
        showCliePayTable();
    }

    function convertTWDateToAD(twDate) {
        if (!twDate) return null;
        const parts = twDate.split('-');
        if (parts.length !== 3) return null;

        const year = parseInt(parts[0], 10) + 1911;
        const month = String(parseInt(parts[1], 10)).padStart(2, '0');
        const day = String(parseInt(parts[2], 10)).padStart(2, '0');

        return `${year}-${month}-${day}`;
    }

    function OpenUpload(File_ID, File_Type) {
        var url = "../UpLoad/Upload_List.html?cknum=" + File_ID
        window.open(url, "_file_list", "scrollbars=yes,resizable=no,width=725,height=400,top=300,left=150");
    }
</script>
