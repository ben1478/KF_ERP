<script>


    const itemsPerPage = 20;  
    let currentPage = 1;
    let data = []; 

	dateTW();
        convertToTaiwanDate();

 function convertToTaiwanDate() {
        var currentDate = new Date();
        var westernYear = currentDate.getFullYear();
        var taiwanYear = westernYear - 1911;
        var month = currentDate.getMonth() + 1;
        var day = currentDate.getDate();
        var formattedDate = taiwanYear + '-' + (month < 10 ? '0' + month : month) + '-' + (day < 10 ? '0' + day : day);
        document.querySelector('input[name="yyymmdd"]').value = formattedDate;
    }
	function GetBaseDate()
	{
		const parts = document.querySelector('input[name="yyymmdd"]').value.split('-');
        const taiwanYear = parseInt(parts[0]);  
        const month = parseInt(parts[1]);  
        const day = parseInt(parts[2]); 
        const westernYear = taiwanYear + 1911;

        return `${westernYear}-${month < 10 ? '0' + month : month}-${day < 10 ? '0' + day : day}`;
	}
    function fetchData() {
        let BaseDate  = GetBaseDate();
        const url = `${BASE_URL}/AE_RPT/GetOverdueRate?BaseDate=${BaseDate}`;
        fetch(url, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(responseData => {
                if (responseData.resultCode == "000") {
                    data = JSON.parse(responseData.objResult);
                    showPage(data);
                } else {
                    alert(response.resultMsg);
                }
            })
            .catch(error => {
				console.log(`API 請求失敗: error=${error}`);
                alert('API 請求失敗:', error);
            });
    }

function showPage(data) 
{  
	const tbody = document.querySelector('#MainTable tbody');
    tbody.innerHTML = '';
	
	if(data.MoTo.length!=0)
	{
		DataBinding(data.MoTo,0)
	}
	if(data.Car.length!=0)
	{
		DataBinding(data.Car,data.MoTo.length)
	}	
}

function DataBinding(Casedata,Idx)
{
const tbody = document.querySelector('#MainTable tbody');

	Casedata.forEach((item, index) => {
    const row = document.createElement('tr');
	 row.setAttribute('align', 'center');
            row.setAttribute('class', 'c12-k');
            row.setAttribute('bgcolor', '#FFFFFF');
            row.setAttribute('onmouseover', "this.style.background='#FCFCC0';");
            row.setAttribute('onmouseout', "this.style.background='#FFFFFF';");
	row.innerHTML = `
			<td>${Idx+index+1}</td>
			<td >${item.pro_name}</td>
			<td >${item.CS_name}</td>
			<td >${Number(item.amount_total).toLocaleString() }</td>
            <td >${item.RC_date}</td>
			<td >${item.DiffDay}</td>
			<td >${item.DiffType}</td>
			
        `;
        tbody.appendChild(row);
    });
}



	
function exportToExcel()
{
	let BaseDate =  GetBaseDate();
    const url = `${BASE_URL}/AE_RPT/GetOverdueRateExcel?BaseDate=${BaseDate}`;
    $.ajax({
            url: url,
            method: 'POST',
            xhrFields: {
                responseType: 'blob'
            },
           
            contentType: 'application/json',
            success: function (response) {
                const url = window.URL.createObjectURL(response);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `逾放比明細.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            },
            error: function (err) {
                alert('Error generating file');
            }
        });
    }
	$('.datepickerTW').datepickerTW({
        changeYear: true,
        changeMonth: true,
        dateFormat: 'yy-mm-dd'
    });
</script>
